<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="theme-color" content="#0c0f16" />
    <script src="sw-register.js" defer></script>
    <link rel="stylesheet" href="wire.css" />
    <script type="module" src="js/components/wire-chrome.js"></script>
    <title>Fate City: 1999 &mdash; Email</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        background: #0d1118;
        font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
        overflow-x: hidden;
        height: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* ── HEADER ─────────────────────────────────────── */
      .mail-header {
        flex-shrink: 0;
        background: #0c0f16;
        border-bottom: 1px solid #1a2030;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .mail-back {
        font-size: 20px;
        color: #c9a227;
        text-decoration: none;
        opacity: 0.9;
        line-height: 1;
        flex-shrink: 0;
        position: relative;
        padding: 8px;
        margin: -8px;
      }
      .mail-back:hover {
        opacity: 1;
      }
      .mail-back::before {
        content: "";
        position: absolute;
        top: -8px;
        bottom: -8px;
        left: -8px;
        right: -8px;
      }
      .mail-live-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #c9a227;
        flex-shrink: 0;
        animation: live-pulse 2s ease-in-out infinite;
      }
      @keyframes live-pulse {
        0%,
        100% {
          opacity: 0.35;
        }
        50% {
          opacity: 1;
        }
      }
      .mail-header-icon {
        width: 28px;
        height: 28px;
        border-radius: 7px;
        background: rgba(201, 162, 39, 0.08);
        border: 1px solid rgba(201, 162, 39, 0.28);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .mail-header-icon svg {
        width: 14px;
        height: 14px;
        stroke: #c9a227;
        fill: none;
        stroke-width: 1.6;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .mail-header-info {
        flex: 1;
        min-width: 0;
      }
      .mail-header-title {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.5px;
        color: #e8dfc8;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .mail-header-sub {
        font-size: 9.5px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #3a4a5a;
        margin-top: 2px;
      }
      .intercept-chip {
        font-size: 8px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #4ade80;
        border: 1px solid rgba(74, 222, 128, 0.38);
        background: rgba(74, 222, 128, 0.06);
        padding: 2px 6px;
        border-radius: 2px;
        flex-shrink: 0;
      }

      /* ── FEED ───────────────────────────────────────── */
      .mail-feed {
        flex: 1;
        overflow-y: auto;
        padding: 16px 16px 8px;
        scrollbar-width: thin;
        scrollbar-color: rgba(184, 144, 47, 0.2) transparent;
      }
      .mail-feed::-webkit-scrollbar {
        width: 3px;
      }
      .mail-feed::-webkit-scrollbar-thumb {
        background: rgba(184, 144, 47, 0.25);
        border-radius: 2px;
      }

      /* ── LIST VIEW — chain rows ─────────────────────── */
      .chain-row {
        display: flex;
        align-items: center;
        gap: 12px;
        max-width: 480px;
        margin: 0 auto;
        padding: 12px 6px;
        text-decoration: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.045);
        opacity: 0;
        transform: translateY(8px);
        transition:
          opacity 0.35s ease,
          transform 0.35s ease;
      }
      .chain-row.in {
        opacity: 1;
        transform: translateY(0);
      }
      .chain-row:active {
        background: rgba(255, 255, 255, 0.03);
      }
      .chain-icon {
        flex-shrink: 0;
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: rgba(201, 162, 39, 0.07);
        border: 1px solid rgba(201, 162, 39, 0.22);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .chain-icon svg {
        width: 18px;
        height: 18px;
        stroke: #c9a227;
        fill: none;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .chain-content {
        flex: 1;
        min-width: 0;
      }
      .chain-top {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 3px;
        gap: 8px;
      }
      .chain-subject {
        font-size: 13.5px;
        font-weight: 600;
        color: #e8dfc8;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .chain-subject.unread {
        color: #f3efe6;
      }
      .chain-time {
        font-size: 10px;
        color: rgba(232, 223, 200, 0.38);
        flex-shrink: 0;
      }
      .chain-preview {
        font-size: 11.5px;
        color: rgba(232, 223, 200, 0.48);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-family: "Courier New", Courier, monospace;
      }
      .chain-preview.unread {
        color: rgba(232, 223, 200, 0.82);
        font-weight: 500;
      }
      .chain-unread-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #c9a227;
        flex-shrink: 0;
      }

      /* ── THREAD VIEW ────────────────────────────────── */
      .mail-thread-subject {
        max-width: 480px;
        margin: 0 auto 18px;
        padding: 10px 14px;
        background: rgba(201, 162, 39, 0.05);
        border: 1px solid rgba(201, 162, 39, 0.14);
        border-radius: 5px;
        font-size: 11px;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: rgba(201, 162, 39, 0.75);
        font-family: "Courier New", Courier, monospace;
        word-break: break-word;
      }
      .mail-block {
        max-width: 480px;
        margin: 0 auto 4px;
        opacity: 0;
        transform: translateY(10px);
        transition:
          opacity 0.4s ease,
          transform 0.4s ease;
      }
      .mail-block.in {
        opacity: 1;
        transform: translateY(0);
      }
      .mail-block-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 6px;
      }
      .mail-from {
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: #4ade80;
        font-family: "Courier New", Courier, monospace;
      }
      .mail-ts {
        font-size: 9.5px;
        color: rgba(232, 223, 200, 0.3);
        font-family: "Courier New", Courier, monospace;
        flex-shrink: 0;
      }
      .mail-body {
        font-size: 13.5px;
        line-height: 1.7;
        color: rgba(232, 223, 200, 0.9);
        font-family: "Courier New", Courier, monospace;
        white-space: pre-wrap;
        word-break: break-word;
        padding: 4px 0 10px;
      }
      .mail-separator {
        max-width: 480px;
        margin: 6px auto 14px;
        border: none;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }

      /* ── EMPTY / FOOTER ─────────────────────────────── */
      .mail-empty {
        max-width: 300px;
        margin: 60px auto;
        text-align: center;
        font-size: 13px;
        font-style: italic;
        line-height: 1.7;
        color: #3a4a5a;
        font-family: "Courier New", Courier, monospace;
      }
      .mail-footer-note {
        flex-shrink: 0;
        text-align: center;
        font-size: 9px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #2e3d4a;
        padding: 6px 0 10px;
      }
    </style>
  </head>
  <body>
    <h1
      style="
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
      "
    >
      Fate City: 1999 Wire Email
    </h1>

    <wire-status-bar jail layout="flex"></wire-status-bar>

    <div class="mail-header" id="mail-header"></div>

    <div class="mail-feed" id="mail-feed"></div>
    <div class="mail-footer-note">
      Encrypted &middot; Read only &middot; Data packet
    </div>

    <wire-home-bar layout="flex"></wire-home-bar>

    <script type="module">
      import { startClock } from "./js/wire-clock.js";
      import { dbGet } from "./js/firebase-db.js";

      var SEEN_CHAINS_KEY = "wire-email-seen-chains";

      var params = new URLSearchParams(window.location.search);
      var activeChainId = params.get("id"); // null = list view, string = thread view

      var feed = document.getElementById("mail-feed");
      var headerEl = document.getElementById("mail-header");
      var renderedCount = 0;

      startClock();

      function escapeHtml(s) {
        var d = document.createElement("div");
        d.textContent = s == null ? "" : String(s);
        return d.innerHTML;
      }

      function escapeAttr(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function relTime(ts) {
        var diff = Math.max(0, Date.now() - ts);
        var s = Math.floor(diff / 1000);
        if (s < 10) return "now";
        if (s < 60) return s + "s ago";
        var m = Math.floor(s / 60);
        if (m < 60) return m + "m ago";
        var h = Math.floor(m / 60);
        if (h < 24) return h + "h ago";
        return Math.floor(h / 24) + "d ago";
      }

      // ── Seen-chain tracking (unread state) ────────────
      function getSeenChains() {
        try {
          var raw = localStorage.getItem(SEEN_CHAINS_KEY);
          return raw ? JSON.parse(raw) : {};
        } catch (e) {
          return {};
        }
      }

      function markChainSeen(id) {
        var seen = getSeenChains();
        seen[id] = Date.now();
        localStorage.setItem(SEEN_CHAINS_KEY, JSON.stringify(seen));
      }

      // Firebase stores arrays as numeric-keyed objects — normalize back.
      function normMessages(raw) {
        if (!raw) return [];
        if (Array.isArray(raw)) return raw;
        return Object.keys(raw)
          .sort(function (a, b) {
            return parseInt(a, 10) - parseInt(b, 10);
          })
          .map(function (k) {
            return raw[k];
          });
      }

      // ── Header ────────────────────────────────────────
      function renderHeader(subject) {
        if (activeChainId) {
          headerEl.innerHTML =
            '<a class="mail-back" href="emails" aria-label="Back to all emails">&lsaquo;</a>' +
            '<div class="mail-header-icon">' +
            '<svg viewBox="0 0 24 24"><rect x="3" y="5.5" width="18" height="13" rx="1.5"/><path d="M3.6 6.8l8.4 6.3 8.4-6.3"/></svg>' +
            "</div>" +
            '<div class="mail-header-info">' +
            '<div class="mail-header-title" id="mail-thread-title">' +
            escapeHtml(subject || "Loading\u2026") +
            "</div>" +
            '<div class="mail-header-sub">Intercepted &middot; Fate City</div>' +
            "</div>" +
            '<span class="intercept-chip">Decrypted</span>';
        } else {
          headerEl.innerHTML =
            '<a class="mail-back" href="home.html" aria-label="Back to home screen">&lsaquo;</a>' +
            '<span class="mail-live-dot" aria-hidden="true"></span>' +
            '<div class="mail-header-info">' +
            '<div class="mail-header-title">Email</div>' +
            '<div class="mail-header-sub">Intercepted data &middot; Fate City</div>' +
            "</div>" +
            '<span class="intercept-chip" style="margin-left:auto;">Secure</span>';
        }
      }
      renderHeader();

      function showEmptyState(html) {
        if (feed.querySelector(".mail-empty")) return;
        feed.innerHTML = '<div class="mail-empty">' + html + "</div>";
      }

      function clearEmptyState() {
        var el = feed.querySelector(".mail-empty");
        if (el) el.remove();
      }

      // ── List view ─────────────────────────────────────
      function renderList(data) {
        var seen = getSeenChains();
        var chains = Object.keys(data)
          .map(function (id) {
            var c = data[id];
            c._id = id;
            return c;
          })
          .filter(function (c) {
            return c.staged === true;
          })
          .sort(function (a, b) {
            return (b.createdAt || 0) - (a.createdAt || 0);
          });

        if (!chains.length) {
          showEmptyState("No data packets received.<br>Insert when acquired.");
          return;
        }
        clearEmptyState();

        feed.innerHTML = chains
          .map(function (chain) {
            var msgs = normMessages(chain.messages);
            var last = msgs.length ? msgs[msgs.length - 1] : null;
            var preview = last
              ? "FROM: " +
                (last.from || "?") +
                " \u2014 " +
                (last.body || "").substring(0, 55)
              : "";
            var isUnread = !seen[chain._id];
            var ts = chain.createdAt || (last && last.ts) || 0;

            return (
              '<a class="chain-row" href="emails?id=' +
              encodeURIComponent(chain._id) +
              '">' +
              '<div class="chain-icon">' +
              '<svg viewBox="0 0 24 24"><rect x="3" y="5.5" width="18" height="13" rx="1.5"/><path d="M3.6 6.8l8.4 6.3 8.4-6.3"/></svg>' +
              "</div>" +
              '<div class="chain-content">' +
              '<div class="chain-top">' +
              '<span class="chain-subject' +
              (isUnread ? " unread" : "") +
              '">' +
              escapeHtml(chain.subject || "(no subject)") +
              "</span>" +
              '<span class="chain-time">' +
              relTime(ts) +
              "</span>" +
              "</div>" +
              '<div class="chain-preview' +
              (isUnread ? " unread" : "") +
              '">' +
              escapeHtml(preview) +
              "</div>" +
              "</div>" +
              (isUnread
                ? '<span class="chain-unread-dot" aria-hidden="true"></span>'
                : "") +
              "</a>"
            );
          })
          .join("");

        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            feed.querySelectorAll(".chain-row").forEach(function (row) {
              row.classList.add("in");
            });
          });
        });
      }

      // ── Thread view ───────────────────────────────────
      function renderThread(chain) {
        var msgs = normMessages(chain.messages);

        // Update header title once subject is known
        renderHeader(chain.subject);

        if (!msgs.length) {
          showEmptyState("No messages in this thread.");
          return;
        }
        clearEmptyState();

        // On first render, insert subject line
        if (renderedCount === 0) {
          var subjDiv = document.createElement("div");
          subjDiv.className = "mail-thread-subject";
          subjDiv.textContent = "SUBJECT: " + (chain.subject || "");
          feed.appendChild(subjDiv);
        }

        // Only append messages we haven't rendered yet
        if (msgs.length <= renderedCount) return;

        for (var i = renderedCount; i < msgs.length; i++) {
          if (i > 0) {
            var sep = document.createElement("hr");
            sep.className = "mail-separator";
            feed.appendChild(sep);
          }

          var m = msgs[i];
          var block = document.createElement("div");
          block.className = "mail-block";
          block.innerHTML =
            '<div class="mail-block-header">' +
            '<span class="mail-from">FROM: ' +
            escapeHtml(m.from || "Unknown") +
            "</span>" +
            '<span class="mail-ts">' +
            (m.ts ? relTime(m.ts) : "") +
            "</span>" +
            "</div>" +
            '<div class="mail-body">' +
            escapeHtml(m.body || "") +
            "</div>";
          feed.appendChild(block);

          (function (el) {
            requestAnimationFrame(function () {
              requestAnimationFrame(function () {
                el.classList.add("in");
              });
            });
          })(block);
        }

        renderedCount = msgs.length;
        feed.scrollTop = feed.scrollHeight;
        markChainSeen(activeChainId);
      }

      // ── Poll loop ─────────────────────────────────────
      async function poll() {
        if (activeChainId) {
          var chain = await dbGet("emails/" + activeChainId);
          if (!chain || chain.staged !== true) {
            showEmptyState("Data packet not found<br>or not yet accessible.");
            return;
          }
          renderThread(chain);
        } else {
          var data = await dbGet("emails");
          if (!data) {
            showEmptyState(
              "No data packets received.<br>Insert when acquired.",
            );
            return;
          }
          renderList(data);
        }
      }

      poll();
      setInterval(poll, 3000);
    </script>
  </body>
</html>
