<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fate City: 1999 &mdash; Messages</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        background: #0d1118;
        font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
        overflow-x: hidden;
        height: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      .wire-once {
        height: 4px;
        background: #7c3aed;
        flex-shrink: 0;
      }
      .wire-status {
        height: 36px;
        background: #0c0f16;
        border-bottom: 1px solid #1a2030;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        flex-shrink: 0;
        position: relative;
      }
      .wire-status-left { display: flex; align-items: center; gap: 6px; }
      .wire-sig { display: flex; align-items: flex-end; gap: 2px; height: 12px; }
      .wire-sig span { width: 3px; border-radius: 1px; background: #c9a227; display: inline-block; }
      .wire-skam { font-size: 10px; font-weight: 600; letter-spacing: .8px; color: #c9a227; }
      .wire-jail {
        font-size: 8.5px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
        color: #e05a3a; border: 1px solid rgba(224,90,58,.4); background: rgba(224,90,58,.08);
        padding: 2px 5px; border-radius: 2px;
      }
      .wire-clock {
        position: absolute; left: 50%; transform: translateX(-50%);
        font-size: 11.5px; color: #6a7d90; letter-spacing: .3px;
      }
      .wire-batt {
        width: 20px; height: 11px; border: 1.5px solid #4a5a6a; border-radius: 2px;
        padding: 1.5px; position: relative;
      }
      .wire-batt::after {
        content: ''; position: absolute; right: -4px; top: 50%; transform: translateY(-50%);
        width: 2px; height: 5px; background: #4a5a6a; border-radius: 0 1px 1px 0;
      }
      .wire-batt-fill { height: 100%; width: 72%; background: #c9a227; border-radius: 1px; }

      .msg-header {
        flex-shrink: 0;
        background: #0c0f16;
        border-bottom: 1px solid #1a2030;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .msg-back {
        font-size: 20px;
        color: #c9a227;
        text-decoration: none;
        opacity: .9;
        line-height: 1;
        flex-shrink: 0;
      }
      .msg-back:hover { opacity: 1; }
        width: 7px; height: 7px; border-radius: 50%;
        background: #c9a227; flex-shrink: 0;
        animation: live-pulse 2s ease-in-out infinite;
      }
      @keyframes live-pulse { 0%, 100% { opacity: .35; } 50% { opacity: 1; } }
      .msg-header-title { font-size: 14px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: #e8dfc8; }
      .msg-header-sub { font-size: 9.5px; letter-spacing: 1px; text-transform: uppercase; color: #3a4a5a; margin-top: 2px; }

      .msg-feed {
        flex: 1;
        overflow-y: auto;
        padding: 16px 16px 8px;
        scrollbar-width: thin;
        scrollbar-color: rgba(184,144,47,.2) transparent;
      }
      .msg-feed::-webkit-scrollbar { width: 3px; }
      .msg-feed::-webkit-scrollbar-thumb { background: rgba(184,144,47,.25); border-radius: 2px; }

      .msg-row {
        display: flex;
        gap: 10px;
        max-width: 480px;
        margin: 0 auto 16px;
        opacity: 0;
        transform: translateY(10px);
        transition: opacity .4s ease, transform .4s ease;
      }
      .msg-row.in { opacity: 1; transform: translateY(0); }
      .msg-avatar {
        flex-shrink: 0;
        width: 32px; height: 32px;
        border-radius: 50%;
        border: 1px solid;
        display: flex; align-items: center; justify-content: center;
        font-size: 11.5px; font-weight: 700;
      }
      .msg-content { flex: 1; min-width: 0; }
      .msg-top {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 4px;
      }
      .msg-name { font-size: 12.5px; font-weight: 600; }
      .msg-time { font-size: 9.5px; color: rgba(232,223,200,.4); }
      .msg-bubble {
        background: rgba(255,255,255,.04);
        border-left: 3px solid;
        border-radius: 4px 10px 10px 4px;
        padding: 9px 12px;
        font-size: 13.5px;
        line-height: 1.5;
        color: rgba(232,223,200,.92);
        word-wrap: break-word;
      }

      .msg-empty {
        max-width: 320px;
        margin: 60px auto;
        text-align: center;
        font-size: 13px;
        font-style: italic;
        line-height: 1.6;
        color: #3a4a5a;
      }

      .msg-footer-note {
        flex-shrink: 0;
        text-align: center;
        font-size: 9px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #2e3d4a;
        padding: 6px 0 10px;
      }

      .wire-home {
        flex-shrink: 0;
        height: 32px;
        background: #0c0f16;
        border-top: 1px solid #1a2030;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .wire-home-ind { width: 90px; height: 4px; background: #1e2840; border-radius: 2px; }
    </style>
  </head>
  <body>
    <h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Fate City: 1999 Wire Messages, a read-only live group thread</h1>

    <div class="wire-once" aria-hidden="true"></div>
    <div class="wire-status">
      <div class="wire-status-left">
        <div class="wire-sig" aria-label="Signal: 4 of 5 bars">
          <span style="height:4px"></span>
          <span style="height:6px"></span>
          <span style="height:9px"></span>
          <span style="height:11px"></span>
          <span style="height:12px;opacity:.28"></span>
        </div>
        <span class="wire-skam">S.K.AM</span>
        <span class="wire-jail">JAILBROKEN</span>
      </div>
      <span class="wire-clock" id="wire-clock"></span>
      <div class="wire-batt" aria-label="Battery 72%"><div class="wire-batt-fill"></div></div>
    </div>

    <div class="msg-header">
      <a class="msg-back" href="home.html" aria-label="Back to home screen">&lsaquo;</a>
      <span class="msg-live-dot" aria-hidden="true"></span>
      <div>
        <div class="msg-header-title">Messages</div>
        <div class="msg-header-sub">Group &middot; Fate City</div>
      </div>
    </div>

    <div class="msg-feed" id="msg-feed"></div>
    <div class="msg-footer-note">Read only &middot; updates live</div>

    <div class="wire-home"><div class="wire-home-ind" aria-hidden="true"></div></div>

    <script>
      var feed = document.getElementById('msg-feed');
      var renderedCount = 0;
      var renderedIds = {};

      function tickClock() {
        var el = document.getElementById('wire-clock');
        if (!el) return;
        var n = new Date();
        var h = String(n.getHours()).padStart(2, '0');
        var m = String(n.getMinutes()).padStart(2, '0');
        el.textContent = h + ':' + m;
      }
      tickClock();
      setInterval(tickClock, 15000);

      function escapeHtml(s) {
        var d = document.createElement('div');
        d.textContent = s == null ? '' : String(s);
        return d.innerHTML;
      }

      function hexToRgba(hex, a) {
        var h = String(hex).replace('#', '');
        var r = parseInt(h.substring(0, 2), 16);
        var g = parseInt(h.substring(2, 4), 16);
        var b = parseInt(h.substring(4, 6),16);
        return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
      }

      function initials(name) {
        var clean = String(name || '').replace(/^The\s+/i, '').replace(/\./g, '');
        var parts = clean.split(/[\s-]+/).filter(Boolean);
        if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
        return (parts[0][0] + parts[1][0]).toUpperCase();
      }

      function relTime(ts) {
        var diff = Math.max(0, Date.now() - ts);
        var s = Math.floor(diff / 1000);
        if (s < 10) return 'now';
        if (s < 60) return s + 's ago';
        var m = Math.floor(s / 60);
        if (m < 60) return m + 'm ago';
        var h = Math.floor(m / 60);
        if (h < 24) return h + 'h ago';
        var d = Math.floor(h / 24);
        return d + 'd ago';
      }

      function showEmptyState() {
        if (feed.querySelector('.msg-empty')) return;
        feed.innerHTML = '<div class="msg-empty">Nothing yet. The city is usually loud &mdash; enjoy the quiet while it lasts.</div>';
      }

      function clearEmptyState() {
        var empty = feed.querySelector('.msg-empty');
        if (empty) empty.remove();
      }

      function appendMessage(m) {
        clearEmptyState();
        var color = m.color || '#b8902f';
        var row = document.createElement('div');
        row.className = 'msg-row';
        row.setAttribute('data-id', m.id);
        row.innerHTML =
          '<div class="msg-avatar" style="background:' + hexToRgba(color, 0.16) + ';border-color:' + color + ';color:' + color + '">' + escapeHtml(initials(m.sender)) + '</div>' +
          '<div class="msg-content">' +
            '<div class="msg-top">' +
              '<span class="msg-name" style="color:' + color + '">' + escapeHtml(m.sender) + '</span>' +
              '<span class="msg-time" data-ts="' + m.ts + '">' + relTime(m.ts) + '</span>' +
            '</div>' +
            '<div class="msg-bubble" style="border-left-color:' + color + '">' + escapeHtml(m.text) + '</div>' +
          '</div>';
        feed.appendChild(row);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () { row.classList.add('in'); });
        });
      }

      function refreshTimestamps() {
        var nodes = feed.querySelectorAll('.msg-time');
        nodes.forEach(function (el) {
          var ts = parseInt(el.getAttribute('data-ts'), 10);
          if (!isNaN(ts)) el.textContent = relTime(ts);
        });
      }

      function scrollToBottom() {
        feed.scrollTop = feed.scrollHeight;
      }

      var FIREBASE_URL = 'https://cpr-wire-device-default-rtdb.firebaseio.com';
      var LAST_SEEN_KEY = 'wire-last-seen-ts';

      function setLastSeen(ts) {
        var current = localStorage.getItem(LAST_SEEN_KEY);
        current = current ? parseInt(current, 10) : 0;
        if (ts > current) localStorage.setItem(LAST_SEEN_KEY, String(ts));
      }

      async function poll() {
        var messages = [];
        try {
          var res = await fetch(FIREBASE_URL + '/messages.json');
          if (res.ok) {
            var data = await res.json();
            if (data) {
              messages = Object.keys(data).map(function (k) {
                var m = data[k];
                m.id = k;
                return m;
              }).sort(function (a, b) { return a.ts - b.ts; });
            }
          }
        } catch (e) {
          messages = [];
        }

        if (!messages.length) {
          if (renderedCount === 0) showEmptyState();
          refreshTimestamps();
          return;
        }

        var hadNew = false;
        var maxTs = 0;
        messages.forEach(function (m) {
          if (m.ts > maxTs) maxTs = m.ts;
          if (!renderedIds[m.id]) {
            appendMessage(m);
            renderedIds[m.id] = true;
            hadNew = true;
          }
        });
        renderedCount = messages.length;
        refreshTimestamps();
        if (hadNew) scrollToBottom();
        setLastSeen(maxTs);
      }

      poll();
      setInterval(poll, 3000);
    </script>
  </body>
</html>
