      :root {
        --paper: #f3efe6;
        --paper-dark: #e8e1d2;
        --ink: #1c1a17;
        --ink-soft: #4a4540;
        --gold: #b8902f;
        --line: #cfc6b0;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #0d1118;
        font-family: "Georgia", "Times New Roman", serif;
        color: var(--ink);
        padding-top: 94px;
        padding-bottom: 48px;
        overflow-x: hidden;
      }
      .section-divider {
        max-width: 760px;
        margin: 48px auto 24px;
        display: flex;
        align-items: center;
        gap: 18px;
      }
      .section-divider.first {
        margin-top: 28px;
      }
      .section-divider::before,
      .section-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(184, 144, 47, 0.25),
          transparent
        );
      }
      .section-divider-label {
        font-family: "Arial", sans-serif;
        font-size: 13px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: #8a7a3a;
        white-space: nowrap;
      }

      .card {
        max-width: 760px;
        margin: 0 auto 36px;
        background: var(--paper);
        border: 1px solid var(--line);
        box-shadow:
          0 18px 40px rgba(0, 0, 0, 0.45),
          0 0 0 1px rgba(0, 0, 0, 0.05) inset;
        position: relative;
        overflow: hidden;
      }
      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: repeating-linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.015) 0px,
          transparent 1px,
          transparent 2px
        );
        pointer-events: none;
      }
      .stripe {
        height: 6px;
      }

      .dossier-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 28px 0;
        font-family: "Arial", sans-serif;
        font-size: 11px;
        letter-spacing: 1px;
        color: var(--ink-soft);
      }
      .dossier-head .stamp {
        font-weight: 700;
        letter-spacing: 1.5px;
      }
      .hr {
        margin: 10px 28px 0;
        border: none;
        border-top: 2px solid var(--rule, var(--gold));
      }

      .name-block {
        padding: 18px 28px 4px;
      }
      .name-block h2 {
        font-family: "Arial Black", "Arial", sans-serif;
        font-size: 30px;
        margin: 0;
        letter-spacing: 0.5px;
        color: #191713;
      }
      .name-block .epithet {
        font-style: italic;
        font-size: 15px;
        margin: 6px 0 0;
        color: var(--accent, var(--gold));
      }

      .gallery {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        padding: 14px 28px 6px;
      }
      .gallery .thumb {
        width: 92px;
        height: 92px;
        overflow: hidden;
        border: 1px solid var(--line);
        cursor: pointer;
        background: #fff;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease;
      }
      .gallery .thumb:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.35);
      }
      .gallery .thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .lightbox {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(10, 9, 7, 0.92);
        z-index: 999;
        align-items: center;
        justify-content: center;
        padding: 30px;
        cursor: zoom-out;
      }
      .lightbox.open {
        display: flex;
      }
      .lightbox img {
        max-width: 92vw;
        max-height: 88vh;
        box-shadow: 0 0 60px rgba(0, 0, 0, 0.6);
        border: 1px solid #444;
        cursor: default;
      }
      .lightbox .caption {
        position: absolute;
        bottom: 24px;
        left: 0;
        right: 0;
        text-align: center;
        color: #cfc6b0;
        font-family: "Arial", sans-serif;
        font-size: 13px;
        letter-spacing: 0.5px;
      }
      .lightbox .close-x {
        position: absolute;
        top: 18px;
        right: 26px;
        color: #cfc6b0;
        font-family: "Arial", sans-serif;
        font-size: 28px;
        cursor: pointer;
        line-height: 1;
      }
      .lightbox .nav-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        color: #cfc6b0;
        font-family: "Arial", sans-serif;
        font-size: 36px;
        cursor: pointer;
        padding: 10px 16px;
        user-select: none;
      }
      .lightbox .nav-arrow.prev {
        left: 6px;
      }
      .lightbox .nav-arrow.next {
        right: 6px;
      }

      .stats {
        margin: 18px 28px 4px;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        padding: 10px 0;
      }
      .stat-row {
        display: flex;
        gap: 14px;
        padding: 5px 0;
        font-family: "Arial", sans-serif;
        font-size: 13px;
      }
      .stat-row .label {
        flex: 0 0 130px;
        font-weight: 700;
        letter-spacing: 0.5px;
        color: var(--accent, var(--gold));
        text-transform: uppercase;
        font-size: 11.5px;
      }
      .stat-row .value {
        color: #222;
      }

      .section {
        padding: 6px 28px 0;
      }
      .section h3 {
        font-family: "Arial", sans-serif;
        font-size: 13px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #222;
        border-bottom: 1px solid var(--line);
        padding-bottom: 6px;
        margin: 20px 0 10px;
      }
      .section p {
        font-size: 15.5px;
        line-height: 1.65;
        color: #2a2722;
        margin: 0 0 12px;
      }
      ul.hooks {
        margin: 0 0 6px;
        padding-left: 0;
        list-style: none;
      }
      ul.hooks li {
        font-size: 15px;
        line-height: 1.55;
        color: #2a2722;
        margin: 0 0 9px;
        padding-left: 20px;
        position: relative;
      }
      ul.hooks li::before {
        content: "\2013";
        position: absolute;
        left: 0;
        color: var(--accent, var(--gold));
        font-weight: 700;
      }

      blockquote {
        margin: 16px 28px 6px;
        padding: 6px 0 6px 18px;
        border-left: 3px solid var(--accent, var(--gold));
        font-style: italic;
        font-size: 15px;
        color: #3a3630;
      }
      blockquote .cite {
        display: block;
        margin-top: 6px;
        font-style: normal;
        font-size: 12px;
        letter-spacing: 0.5px;
        color: #8a8275;
        font-family: "Arial", sans-serif;
        text-transform: uppercase;
      }

      .footer-pad {
        height: 24px;
      }

      @media print {
        body {
          background: #fff;
          padding: 0;
        }
        .card {
          box-shadow: none;
          page-break-after: always;
        }
        .wire-once,
        .wire-status,
        .wire-header,
        .wire-home {
          display: none !important;
        }
      }

      @media (max-width: 600px) {
        body {
          padding-top: 94px;
          padding-bottom: 48px;
          padding-left: 0;
          padding-right: 0;
        }
        .card {
          max-width: 100%;
          margin: 0 0 24px;
        }
        .name-block h2 {
          font-size: 24px;
        }
        .name-block .epithet {
          font-size: 15px;
        }
        .dossier-head {
          padding: 12px 16px 0;
          font-size: 10px;
        }
        .hr {
          margin: 10px 16px 0;
        }
        .name-block {
          padding: 14px 16px 4px;
        }
        .gallery {
          padding: 12px 16px 6px;
        }
        .stats {
          margin: 14px 16px 4px;
        }
        .stat-row {
          flex-direction: column;
          gap: 2px;
          font-size: 14px;
        }
        .stat-row .label {
          flex: none;
          font-size: 11px;
        }
        .section {
          padding: 6px 16px 0;
        }
        .section p {
          font-size: 16.5px;
          line-height: 1.7;
        }
        ul.hooks li {
          font-size: 16px;
        }
        blockquote {
          margin: 14px 16px 6px;
          font-size: 16px;
        }
      }

      /* ===== WIRE NOTIFICATIONS (unread badge + toast) ===== */
      .wire-unread-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #c9a227;
        display: none;
        margin-left: 6px;
        flex-shrink: 0;
        animation: wire-live-pulse 2s ease-in-out infinite;
      }
      .wire-unread-dot.show {
        display: inline-block;
      }
      @keyframes wire-live-pulse {
        0%,
        100% {
          opacity: 0.35;
        }
        50% {
          opacity: 1;
        }
      }
      .wire-toast {
        position: fixed;
        top: 44px;
        left: 50%;
        transform: translateX(-50%) translateY(-10px);
        background: #1a1530;
        border: 1px solid rgba(201, 162, 39, 0.4);
        color: #e8dfc8;
        font-size: 11px;
        font-weight: 600;
        padding: 10px 16px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        gap: 6px;
        z-index: 300;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.3s ease,
          transform 0.3s ease;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.45);
        white-space: nowrap;
        font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
        text-decoration: none;
        cursor: pointer;
      }
      .wire-toast::before {
        content: "";
        position: absolute;
        top: -10px;
        bottom: -10px;
        left: -10px;
        right: -10px;
      }
      .wire-toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
        pointer-events: auto;
      }
    </style>
  </head>

            {
              label: "Comedown",
              value:
                "Significant \u2014 described as something being taken away a second time",
            },
          ],
          sections: [
            {
              heading: "Overview",
              paragraphs: [
                "Trace is what gets sold past Nocturne\u2019s second door \u2014 the one without a handle on the outside. The substance is reportedly distilled from whatever\u2019s stripped out of an unregistered power-user when they\u2019re neutralized or suppressed: the sensation of having had power, extracted and made transferable. A non-magical person who takes it borrows that sensation briefly. Not the power itself \u2014 the feeling of it. The memory of what it was like to have it, experienced in someone else\u2019s body while they\u2019re no longer in a position to object.",
                "The comedown is consistent across every reported account: it doesn\u2019t fade, it\u2019s taken. Whatever the high felt like it gave, the low feels like having that thing removed a second time \u2014 including from someone who never had it to begin with.",
              ],
            },
            {
              heading: "A Note From Your Benefactor",
              hooks: [
                "The people whose experience is inside that product didn\u2019t consent to it being there. That\u2019s not a moral position \u2014 it\u2019s a fact about what\u2019s being bought and sold.",
                "Nocturne sells it exclusively. That means they have a supply chain. Follow the supply chain far enough and you\u2019ll find something nobody in that building wants found.",
                "It leaves a signature. Anyone who can read that signature knows what you did and roughly when.",
                "The Agency is theoretically supposed to track this substance. They haven\u2019t moved on Nocturne. Draw your own conclusions.",
              ],
            },
          ],
          quote: {
            text: "They say it feels like being someone who matters. The part they don\u2019t advertise is what it feels like afterward.",
            cite: "Anonymous, recovered from Nocturne exit survey (redacted)",
          },
        },
      ];

      // ===================== RENDER ENGINE =====================
      // You shouldn't need to edit anything below this line.

      function escapeAttr(str) {
        return String(str).replace(/"/g, "&quot;");
      }

      function renderCard(entry) {
        const c = entry.colors || {};
        const gallery = (entry.images || [])
          .map(
            (src) => `
                <div class="thumb" data-full="${escapeAttr(src)}" data-caption="${escapeAttr(entry.name)}">
                  <img src="${escapeAttr(src)}" alt="${escapeAttr(entry.name)}" />
                </div>`,
          )
          .join("");

        const stats = (entry.stats || [])
          .map(
            (s) => `
                <div class="stat-row">
                  <span class="label">${s.label}</span><span class="value">${s.value}</span>
                </div>`,
          )
          .join("");

        const sections = (entry.sections || [])
          .map((sec) => {
            const heading = sec.heading ? `<h3>${sec.heading}</h3>` : "";
            const paras = (sec.paragraphs || [])
              .map((p) => `<p>${p}</p>`)
              .join("");
            const hooks = sec.hooks
              ? `<ul class="hooks">${sec.hooks.map((h) => `<li>${h}</li>`).join("")}</ul>`
              : "";
            return heading + paras + hooks;
          })
          .join("");

        const quote = entry.quote
          ? `<blockquote>${entry.quote.text}<span class="cite">${entry.quote.cite}</span></blockquote>`
          : "";

        return `
              <div class="card" style="--rule:${c.rule || "#b8902f"}; --accent:${c.accent || "#b8902f"}">
                <div class="stripe" style="background:${c.stripe || c.rule || "#b8902f"}"></div>
                <div class="dossier-head">
                  <span>FILE NO. ${entry.fileNo || "\u2014"}</span>
                  <span class="stamp" style="color:${c.stampColor || c.accent || "#b8902f"}">${entry.stamp || ""}</span>
                </div>
                <hr class="hr" />
                <div class="name-block">
                  <h2>${entry.name}</h2>
                  <p class="epithet">${entry.epithet || ""}</p>
                </div>
                <div class="gallery" data-gallery="${entry.id}">${gallery}</div>
                <div class="stats">${stats}</div>
                <div class="section">${sections}</div>
                ${quote}
                <div class="footer-pad"></div>
              </div>`;
      }

      function renderSectionDivider(label, isFirst) {
        return `
              <div class="section-divider${isFirst ? " first" : ""}">
                <span class="section-divider-label">${label}</span>
              </div>`;
      }

      function renderAll() {
        const root = document.getElementById("cards-root");

        const culture = ENTRIES.filter((e) => e.category === "culture");
        const infrastructure = ENTRIES.filter(
          (e) => e.category === "infrastructure",
        );
        const technology = ENTRIES.filter((e) => e.category === "technology");
        const services = ENTRIES.filter((e) => e.category === "services");
        const substances = ENTRIES.filter((e) => e.category === "substances");

        const groups = [
          { entries: culture, label: "Culture" },
          { entries: infrastructure, label: "Infrastructure" },
          { entries: technology, label: "Technology" },
          { entries: services, label: "Services" },
          { entries: substances, label: "Substances" },
        ];

        let html = "";
        let firstRendered = true;
        groups.forEach(({ entries, label }) => {
          if (!entries.length) return;
          html += renderSectionDivider(label, firstRendered);
          html += entries.map(renderCard).join("");
          firstRendered = false;
        });

        root.innerHTML = html;
        wireGalleries();
      }

      // ===================== LIGHTBOX =====================
      function wireGalleries() {
        const lightbox = document.getElementById("lightbox");
        const lbImg = document.getElementById("lb-img");
        const lbCaption = document.getElementById("lb-caption");
        let currentGallery = [];
        let currentIndex = 0;

        function showCurrent() {
          const thumb = currentGallery[currentIndex];
          lbImg.src = thumb.getAttribute("data-full");
          lbCaption.textContent = thumb.getAttribute("data-caption") || "";
          const multi = currentGallery.length > 1;
          document.getElementById("lb-prev").style.display = multi
            ? "block"
            : "none";
          document.getElementById("lb-next").style.display = multi
            ? "block"
            : "none";
        }

        function openLightbox(galleryName, index) {
          currentGallery = Array.prototype.slice.call(
            document.querySelectorAll(
              '.gallery[data-gallery="' + galleryName + '"] .thumb',
            ),
          );
          currentIndex = index;
          showCurrent();
          lightbox.classList.add("open");
        }

        function closeLightbox() {
          lightbox.classList.remove("open");
          lbImg.src = "";
        }

        document.querySelectorAll(".gallery .thumb").forEach((thumb) => {
          thumb.addEventListener("click", () => {
            const gallery = thumb.closest(".gallery");
            const galleryName = gallery.getAttribute("data-gallery");
            const thumbs = Array.prototype.slice.call(
              gallery.querySelectorAll(".thumb"),
            );
            openLightbox(galleryName, thumbs.indexOf(thumb));
          });
        });

        document.getElementById("lb-close").onclick = closeLightbox;
        lightbox.onclick = (e) => {
          if (e.target === lightbox) closeLightbox();
        };
        document.getElementById("lb-prev").onclick = (e) => {
          e.stopPropagation();
          if (currentGallery.length < 2) return;
          currentIndex =
            (currentIndex - 1 + currentGallery.length) % currentGallery.length;
          showCurrent();
        };
        document.getElementById("lb-next").onclick = (e) => {
          e.stopPropagation();
          if (currentGallery.length < 2) return;
          currentIndex = (currentIndex + 1) % currentGallery.length;
          showCurrent();
        };
        document.addEventListener("keydown", (e) => {
          if (!lightbox.classList.contains("open")) return;
          if (e.key === "Escape") closeLightbox();
          if (e.key === "ArrowLeft") document.getElementById("lb-prev").click();
          if (e.key === "ArrowRight")
            document.getElementById("lb-next").click();
        });
      }

      renderAll();

      startClock();
      startNotifications();
    </script>
    <!-- ===== WIRE HOME BAR ===== -->
    <wire-home-bar></wire-home-bar>
  </body>
</html>
